<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>progress-ring — banner</title>
    <script type="module" src="../src/progress-ring.js"></script>
    <!--
      Screenshot target: 1200 × 400 px
      Open in browser, set window to 1200 px wide, screenshot the body.
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 1200px;
        height: 400px;
        background: #0f172a;
        font-family: ui-sans-serif, system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 0 56px;
        gap: 48px;
      }

      /* ── left: identity ───────────────────────────────────────────────── */
      .identity {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .identity img {
        width: 56px;
        height: 56px;
      }
      .identity h1 {
        font-size: 2.25rem;
        font-weight: 700;
        color: #f8fafc;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .identity p {
        font-size: 0.875rem;
        color: #94a3b8;
        max-width: 240px;
        line-height: 1.5;
      }
      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .badge {
        font-size: 0.7rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 999px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .badge-blue   { background: #1e3a5f; color: #7dd3fc; }
      .badge-violet { background: #2e1065; color: #c4b5fd; }
      .badge-green  { background: #14532d; color: #86efac; }

      /* ── divider ──────────────────────────────────────────────────────── */
      .divider {
        flex: 0 0 1px;
        align-self: stretch;
        background: #1e293b;
        margin: 32px 0;
      }

      /* ── rings ────────────────────────────────────────────────────────── */
      .rings {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0;
      }
      .ring-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .ring-label {
        font-size: 0.65rem;
        font-weight: 600;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      progress-ring {
        display: block;
      }
    </style>
  </head>
  <body>

    <!-- identity -->
    <div class="identity">
      <img src="../assets/logo-light.png" alt="">
      <h1>progress-ring</h1>
      <p>SVG Web Component &mdash; zero dependencies, Vue 3 &amp; React wrappers included.</p>
      <div class="badges">
        <span class="badge badge-blue">Web Component</span>
        <span class="badge badge-violet">Vue 3</span>
        <span class="badge badge-green">React</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- showcase rings -->
    <div class="rings">

      <!-- default -->
      <div class="ring-cell">
        <progress-ring
          value="72"
          primary-color="#4f8ef7"
          muted-color="#1e3a5f"
          animated="true"
          style="width:110px;height:110px"
        ></progress-ring>
        <span class="ring-label">Default</span>
      </div>

      <!-- custom colours -->
      <div class="ring-cell">
        <progress-ring
          value="58"
          primary-color="#e879f9"
          muted-color="#3b0764"
          background-color="#140920"
          corner-radius="16"
          padding="6"
          animated="true"
          animation-delay="150"
          style="width:110px;height:110px"
        ></progress-ring>
        <span class="ring-label">Custom</span>
      </div>

      <!-- linear gradient -->
      <div class="ring-cell">
        <progress-ring
          value="83"
          linear-gradient="#f72585,#7209b7,#4361ee"
          muted-color="#1e293b"
          thickness="10"
          animated="true"
          animation-delay="300"
          style="width:110px;height:110px"
        ></progress-ring>
        <span class="ring-label">Gradient</span>
      </div>

      <!-- gauge -->
      <div class="ring-cell">
        <progress-ring
          value="68"
          primary-color="#fb923c"
          muted-color="#1e293b"
          cut="35"
          rotation="112"
          thickness="10"
          track-thickness="3"
          animated="true"
          animation-delay="450"
          style="width:110px;height:110px"
        ></progress-ring>
        <span class="ring-label">Gauge</span>
      </div>

      <!-- format token -->
      <div class="ring-cell">
        <progress-ring
          value="6"
          max="8"
          primary-color="#34d399"
          muted-color="#1e293b"
          label-format="{value}/{max}"
          font-size="18"
          font-weight="700"
          animated="true"
          animation-delay="600"
          style="width:110px;height:110px"
        ></progress-ring>
        <span class="ring-label">Format token</span>
      </div>

      <!-- counter-clockwise + thick track -->
      <div class="ring-cell">
        <progress-ring
          value="45"
          primary-color="#f87171"
          muted-color="#1e293b"
          direction="counter-clockwise"
          thickness="12"
          stroke-linecap="butt"
          animated="true"
          animation-delay="750"
          style="width:110px;height:110px"
        ></progress-ring>
        <span class="ring-label">Counter-CW</span>
      </div>

    </div>

  </body>
</html>
